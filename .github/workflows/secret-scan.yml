name: Secret scan

# Server-side gate that can't be bypassed with `git commit --no-verify`.
# Two independent layers:
#   - secretlint: runs the committed .secretlintrc.json (preset-recommend) against the tree.
#     The private company/personal denylist is local-only (.secretlintrc.local.json,
#     gitignored) and is enforced by the local pre-commit hook, by design -- those terms must
#     never be published to this repo, not even as a scanner pattern.
#   - gitleaks: broad credential coverage plus a full git-history scan, catching secrets
#     that may already live in earlier commits.
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  secretlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run secretlint
        run: pnpm secretlint

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        # Official binary is license-free; the gitleaks-action wrapper needs an org license.
        # `detect` scans the whole git history by default; --redact keeps secrets out of logs.
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --redact --verbose --exit-code 1
