name: Release Obsidian plugin

# バージョン番号そのもの（例: 1.0.0、v 接頭辞なし）のタグ push で発火する。
# Obsidian コミュニティプラグインのリリース慣習に従い、タグ名 = manifest.json の version とする。
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write
  id-token: write      # for build-provenance OIDC
  attestations: write  # to record artifact attestations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm run build

      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG="${GITHUB_REF_NAME}"
          if [ "$MANIFEST_VERSION" != "$TAG" ]; then
            echo "::error::Tag ($TAG) does not match manifest.json version ($MANIFEST_VERSION)."
            exit 1
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Collect release assets
        id: assets
        run: |
          ASSETS="main.js manifest.json"
          if [ -f styles.css ]; then
            ASSETS="$ASSETS styles.css"
          fi
          echo "files=$ASSETS" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tags containing a hyphen (e.g. 0.2.0-beta.1) are published as pre-releases
          # so BRAT beta testers can opt in without affecting the stable community listing.
          PRERELEASE=""
          case "${GITHUB_REF_NAME}" in *-*) PRERELEASE="--prerelease" ;; esac
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            $PRERELEASE \
            ${{ steps.assets.outputs.files }}

      - name: Clean up beta pre-releases superseded by this stable release
        # 安定版リリース時のみ発火する。タグにハイフンを含む pre-release（例: 0.2.0-beta.1）では
        # スキップし、ベータ自身が自分を消すことを防ぐ。
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Cleaning up pre-releases superseded by ${VERSION}..."
          # 同一バージョンの pre-release（X.Y.Z-beta.* / -rc.* など X.Y.Z- で始まるもの）を、
          # GitHub Release と git タグの両方ごと削除する。安定版 Release は発行済みなので、
          # 個々の削除失敗はジョブを失敗させず警告に留める（冪等・非致命）。
          gh release list --limit 200 --json tagName --jq '.[].tagName' | while read -r TAG; do
            case "$TAG" in
              "${VERSION}-"*)
                echo "Deleting superseded pre-release: ${TAG}"
                gh release delete "${TAG}" --cleanup-tag --yes || echo "::warning::Failed to delete ${TAG}"
                ;;
            esac
          done
